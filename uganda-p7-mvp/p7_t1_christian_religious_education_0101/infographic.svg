<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Christians and the Holy Spirit (Topic 1: Enriched in the Spirit) infographic">
  <rect width="1600" height="900" fill="#F8FAFC"/>
  <rect x="0" y="0" width="1600" height="88" fill="#111827"/>
  <rect x="0" y="88" width="1600" height="14" fill="#FCD116"/>
  <rect x="0" y="102" width="1600" height="12" fill="#D90000"/>
  <text x="70" y="57" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="white">Uganda P7 visual summary</text>
  <text x="70" y="170" text-anchor="start" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#111827"><tspan x="70" dy="0">Christians</tspan><tspan x="70" dy="55">and the</tspan><tspan x="70" dy="55">Holy</tspan></text>
  
  <polygon points="800,250 420,690 1180,690" fill="#FFF7E0" stroke="#111827" stroke-width="8"/>
  <circle cx="800" cy="250" r="92" fill="#FCD116" stroke="#111827" stroke-width="6"/>
  <circle cx="420" cy="690" r="92" fill="#D90000" stroke="#111827" stroke-width="6"/>
  <circle cx="1180" cy="690" r="92" fill="#1B7F3A" stroke="#111827" stroke-width="6"/>
  <text x="800" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="black"><tspan x="800" dy="0">What is a Spirit?</tspan></text>
  <text x="420" y="675" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="white"><tspan x="420" dy="0">Defining the Holy</tspan><tspan x="420" dy="27">Spirit</tspan></text>
  <text x="1180" y="675" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="white"><tspan x="1180" dy="0">The Holy Trinity</tspan></text>
  <rect x="560" y="440" width="480" height="120" rx="18" fill="white" stroke="#CBD5E1" stroke-width="4"/>
  <text x="800" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#111827"><tspan x="800" dy="0">One idea connects the three parts</tspan></text>
  <text x="160" y="735" text-anchor="start" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#475569"><tspan x="160" dy="0">• A spirit is invisible.</tspan></text>
  <text x="586" y="735" text-anchor="start" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#475569"><tspan x="586" dy="0">• The Holy Spirit is God in us.</tspan></text>
  <text x="1012" y="735" text-anchor="start" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#475569"><tspan x="1012" dy="0">• Trinity means &quot;Three in One.&quot;</tspan></text>
</svg>