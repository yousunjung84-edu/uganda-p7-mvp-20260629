  <text x="1002" y="730" text-anchor="start" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#475569"><tspan x="1002" dy="0">• Illustrating the Creation story or</tspan><tspan x="1002" dy="23">Jesus’ service.</tspan></text>
